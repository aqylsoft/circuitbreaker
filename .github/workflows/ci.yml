name: CI

on:
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [closed]
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_review' &&
       github.event.review.state == 'approved' &&
       startsWith(github.event.pull_request.head.ref, 'CB-')) ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'CB-'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Run golangci-lint (redisstore)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: redisstore
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_review' &&
       github.event.review.state == 'approved' &&
       startsWith(github.event.pull_request.head.ref, 'CB-')) ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'CB-'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: |
          go mod download
          cd redisstore && go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Run redisstore tests
        run: cd redisstore && go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out,./redisstore/coverage.out
          fail_ci_if_error: false

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'CB-')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Calculate next version
        id: next_version
        run: |
          LATEST="${{ steps.get_tag.outputs.latest_tag }}"
          VERSION="${LATEST#v}"

          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          PR_TITLE="${{ github.event.pull_request.title }}"

          if [[ "$PR_TITLE" == *"[major]"* ]] || [[ "$PR_TITLE" == *"[breaking]"* ]]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [[ "$PR_TITLE" == *"[minor]"* ]] || [[ "$PR_TITLE" == *"[feature]"* ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Create and push tag
        run: |
          NEW_VERSION="${{ steps.next_version.outputs.new_version }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION

          PR: #${{ github.event.pull_request.number }}
          Branch: $PR_BRANCH
          Title: $PR_TITLE"

          git push origin "$NEW_VERSION"

          echo "Created tag: $NEW_VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next_version.outputs.new_version }}
          name: Release ${{ steps.next_version.outputs.new_version }}
          body: |
            ## Changes

            PR: #${{ github.event.pull_request.number }}
            Branch: `${{ github.event.pull_request.head.ref }}`

            ${{ github.event.pull_request.body }}
          generate_release_notes: true
