name: CI

on:
  pull_request_review:
    types: [submitted]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: |
      github.event.review.state == 'approved' &&
      startsWith(github.event.pull_request.head.ref, 'CB-')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Run golangci-lint (redisstore)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: redisstore
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    if: |
      github.event.review.state == 'approved' &&
      startsWith(github.event.pull_request.head.ref, 'CB-')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: |
          go mod download
          cd redisstore && go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Run redisstore tests
        run: cd redisstore && go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out,./redisstore/coverage.out
          fail_ci_if_error: false
